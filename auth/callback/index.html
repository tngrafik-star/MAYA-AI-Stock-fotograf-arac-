<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MayaSolutions - Oturum Doğrulanıyor...</title>
  
  <!-- Theme Initializer (Avoid white flash on dark theme load) -->
  <script>
    (function() {
      const theme = localStorage.getItem('maya-theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--color-bg);
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      overflow: hidden;
    }
    
    .callback-card {
      background-color: var(--color-card-bg);
      border: 1px solid var(--color-border);
      padding: 48px;
      border-radius: var(--border-radius-lg);
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
      max-width: 400px;
      width: 100%;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: floatIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .spinner-ring {
      width: 50px;
      height: 50px;
      border: 3px solid var(--color-secondary-bg);
      border-top: 3px solid var(--color-accent);
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
      margin: 0 auto 24px auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--color-text-primary);
    }
    
    p {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="callback-card">
    <div class="spinner-ring"></div>
    <h3>Oturum Doğrulanıyor</h3>
    <p>Lütfen bekleyin, MayaSolutions'a yönlendiriliyorsunuz...</p>
  </div>

  <script type="module" src="/js/callback.js"></script>
</body>
</html>
